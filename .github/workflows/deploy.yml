name: Deploy

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        # macOS 上で生成された lockfile に Linux 用 optional deps (@emnapi/* 等) が
        # 欠落しているケースに備え、npm ci 失敗時は npm install にフォールバック。
        # 偏りは PR 時の ci.yml で lockfile drift として警告するので、main の deploy
        # はここで止めず通す。
        run: npm ci || npm install --no-save

      - name: Generate Prisma Client
        run: npx prisma generate

      # 初回のみ: 既存テーブル前提の本番 DB に対しては事前に
      #   DATABASE_URL=... npx prisma migrate resolve --applied 0_init
      # を一度ローカルで実行して baseline を済ませてある必要がある (README 参照)。
      # 未実行のまま走ると CREATE TABLE が衝突してこのステップで失敗する。
      - name: Apply database migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npx prisma migrate deploy

      - name: Build frontend
        env:
          VITE_ALLOW_REGISTRATION: ${{ vars.ALLOW_REGISTRATION }}
        run: npm run build

      - name: Bundle Lambda
        run: |
          mkdir -p terraform/.lambda-build
          npx esbuild api/lambda.ts \
            --bundle \
            --platform=node \
            --target=node22 \
            --format=cjs \
            --outfile=terraform/.lambda-build/index.js \
            --define:'import.meta.url="file:///var/task/index.js"' \
            --log-level=info
          echo '{"name":"task-app-lambda"}' > terraform/.lambda-build/package.json
          cd terraform/.lambda-build && zip -r function.zip index.js package.json

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37 # v6.1.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-1

      # S3_BUCKET_NAME / CLOUDFRONT_DISTRIBUTION_ID / LAMBDA_FUNCTION_NAME は
      # 初回 deploy.sh 実行後に GitHub リポジトリの Variables に設定する
      - name: Sync frontend to S3
        run: |
          # JS/CSS: Viteがコンテンツハッシュ付きファイル名を生成するので長期キャッシュ
          aws s3 sync dist/ s3://${{ vars.S3_BUCKET_NAME }}/ \
            --delete \
            --exclude "*.html" \
            --cache-control "public, max-age=31536000, immutable"
          # HTML: 常に最新を返す
          aws s3 cp dist/index.html s3://${{ vars.S3_BUCKET_NAME }}/index.html \
            --cache-control "no-cache, no-store, must-revalidate"

      - name: Update Lambda function
        run: |
          aws lambda update-function-code \
            --function-name ${{ vars.LAMBDA_FUNCTION_NAME }} \
            --zip-file fileb://terraform/.lambda-build/function.zip \
            --region ap-northeast-1

          # デプロイ完了を待機
          aws lambda wait function-updated \
            --function-name ${{ vars.LAMBDA_FUNCTION_NAME }} \
            --region ap-northeast-1

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
