name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  lockfile-check:
    name: Lockfile multi-platform check
    runs-on: ubuntu-latest
    # 警告のみで PR をブロックしない（continue-on-error）。
    # main にマージされる前に開発者が気づける状態にすることが目的。
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Detect lockfile drift for Linux x64 platform deps
        # --ignore-scripts: husky 等の prepare script を発火させない（node_modules を入れていないため）
        run: |
          npm install --include=optional --os=linux --cpu=x64 --package-lock-only --ignore-scripts
          if ! git diff --exit-code package-lock.json; then
            echo "::warning::package-lock.json は Linux x64 用の optional deps を欠いています。ローカルで以下を実行して push してください:"
            echo "::warning::  npm install --include=optional --os=linux --cpu=x64 --package-lock-only"
            exit 1
          fi
